<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>المحمل الأسطوري</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">
        <img src="icon.png" alt="Logo" width="32">
        <span>المحمل الأسطوري</span>
      </div>
      <div class="status-wrapper">
        <span id="statusText">السيرفر متصل</span>
        <div class="status" id="statusCircle"></div>
      </div>
    </header>

    <main>
      <div class="tab">
        <button class="tablinks active" id="btnCurrent">الصفحة الحالية</button>
        <button class="tablinks" id="btnStreams">الروابط المكتشفة (0)</button>
      </div>

      <!-- الصفحة الحالية -->
      <div id="tabPage" class="tabcontent">
        <div class="info-card">
          <p id="pageTitle">جاري التحميل...</p>
          <div class="action-row">
            <button id="downloadCurrent" class="btn primary">📥 تحميل الفيديو</button>
            <button id="downloadAudio" class="btn secondary">🎵 صوت فقط</button>
          </div>
        </div>
        
        <div class="batch-section">
          <p>روابط مكتشفة في الصفحة: <span id="scrapeCount">0</span></p>
          <button id="downloadBatch" class="btn outline" disabled>🔥 تحميل الكل (دفعة واحدة)</button>
        </div>
      </div>

      <!-- الروابط المصطادة -->
      <div id="tabStreams" class="tabcontent" style="display:none">
        <p class="hint">روابط البث المباشر المكتشفة (m3u8/mp4):</p>
        <ul id="streamList">
          <li class="empty">ابحث عن فيديو لبدء الاصطياد...</li>
        </ul>
      </div>
    </main>

    <footer>
      <a href="http://localhost:5000" target="_blank">🌐 فتح لوحة التحكم الرئيسية</a>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
